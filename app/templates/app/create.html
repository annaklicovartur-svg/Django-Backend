{% extends 'app/boods.html' %}

{% block title %}
Create task
{% endblock %}

{% block content %}
    <h1>Create Task</h1>
    <form method="post">
        <!-- ADDED CSRF TOKEN -->
        {% csrf_token %} 
        {{ form.title }} <br>
        {{ form.task }} <br>
        
        <button type="submit", class="btn btn-success">ADD</button> 
        <span>{{ error }}</span>
    </form>
{% endblock %}
